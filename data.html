<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Aset - Alat Masuk PLN</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="app-page">
    <!-- HEADER -->
    <nav class="navbar pln-navbar px-3 py-2 sticky-top">
      <div class="d-flex align-items-center gap-2">
        <img src="img/logo-pln.jpeg" alt="PLN" class="header-logo" />
        <div>
          <div class="text-white fw-bold" style="font-size: 13px">
            PLN Electricity Service
          </div>
          <div class="text-white-50" style="font-size: 11px">UL Palembang</div>
        </div>
      </div>
      <button
        class="btn btn-outline-light btn-sm fw-semibold"
        onclick="doLogout()"
      >
        <i class="bi bi-box-arrow-right me-1"></i>Keluar
      </button>
    </nav>

    <!-- KONTEN -->
    <div class="container-fluid px-3 py-3 pb-5 mb-4">
      <div class="d-flex align-items-center justify-content-between mb-2">
        <div>
          <h5 class="fw-bold mb-0">Data Aset</h5>
          <p class="text-muted small mb-0">
            Semua kendaraan &amp; peralatan tercatat
          </p>
        </div>
        <span class="badge bg-primary rounded-pill" id="jumlahAset"
          >0 aset</span
        >
      </div>

      <!-- Pencarian -->
      <div class="input-group mb-2">
        <span class="input-group-text bg-white border-end-0"
          ><i class="bi bi-search text-muted"></i
        ></span>
        <input
          type="text"
          class="form-control border-start-0 ps-0"
          id="inputCari"
          placeholder="Cari nama aset atau ULP..."
          oninput="tampilData()"
        />
        <button
          class="btn btn-outline-secondary d-none"
          id="btnHapusCari"
          onclick="hapusCari()"
        >
          <i class="bi bi-x"></i>
        </button>
      </div>

      <!-- Filter ULP -->
      <div class="d-flex gap-2 flex-wrap mb-2" id="ulpFilters"></div>

      <div class="text-muted small mb-2" id="infoHasil"></div>

      <!-- Tabel -->
      <div class="card rounded-4 border-0 shadow-sm overflow-hidden">
        <div class="table-responsive">
          <table class="table table-hover table-sm mb-0 align-middle">
            <thead>
              <tr style="background: linear-gradient(135deg, #003087, #0057b8)">
                <th style="color: white; font-size: 11px">No</th>
                <th style="color: white; font-size: 11px">
                  Kendaraan / Peralatan
                </th>
                <th style="color: white; font-size: 11px">ULP</th>
                <th style="color: white; font-size: 11px">Tgl UL</th>
                <th style="color: white; font-size: 11px">Tgl ULP</th>
                <th style="color: white; font-size: 11px">Usia (hr)</th>
                <th style="color: white; font-size: 11px">Ekonomis (hr)</th>
                <th style="color: white; font-size: 11px">Sisa (hr)</th>
                <th style="color: white; font-size: 11px">Foto</th>
              </tr>
            </thead>
            <tbody id="tabelBody">
              <tr>
                <td colspan="9" class="text-center py-5 text-muted">
                  <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                  Belum ada data
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <a href="entry.html" class="nav-item">
        <i class="bi bi-plus-square fs-5"></i>
        <span>Entry</span>
      </a>
      <a href="data.html" class="nav-item active">
        <i class="bi bi-clipboard-data-fill fs-5"></i>
        <span>Data</span>
      </a>
      <a href="output.html" class="nav-item">
        <i class="bi bi-bar-chart fs-5"></i>
        <span>Output</span>
      </a>
    </nav>

    <!-- Modal Foto -->
    <div class="modal fade" id="imgModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 bg-transparent">
          <img
            id="modalImg"
            src=""
            class="img-fluid rounded-3"
            alt="Foto Aset"
          />
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div
      class="toast-container position-fixed bottom-0 start-50 translate-middle-x mb-5 pb-3"
      style="z-index: 9999"
    >
      <div
        id="toast"
        class="toast text-white bg-primary border-0 rounded-3"
        role="alert"
      >
        <div class="toast-body fw-semibold text-center" id="toastMsg"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      if (!sessionStorage.getItem("pln_logged_in"))
        window.location.href = "index.html";
    </script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/data.js"></script>
  </body>
</html>
